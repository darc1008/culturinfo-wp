services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-culturinfo}
      MARIADB_USER: ${MARIADB_USER:-culturinfo}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15

  wordpress:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MARIADB_USER:-culturinfo}
      WORDPRESS_DB_PASSWORD: ${MARIADB_PASSWORD}
      WORDPRESS_DB_NAME: ${MARIADB_DATABASE:-culturinfo}
      WP_SITEURL: ${WP_SITEURL:-https://culturinfo.statusloop.app}
      WP_HOME: ${WP_SITEURL:-https://culturinfo.statusloop.app}
      WP_TITLE: ${WP_TITLE:-Culturinfo}
      WP_TAGLINE: ${WP_TAGLINE:-Periódico digital de cultura, política y actualidad}
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:-admin@culturinfo.statusloop.app}
      TZ: America/Santo_Domingo
    volumes:
      - wp_data:/var/www/html
    ports:
      - "80:80"

volumes:
  db_data:
  wp_data:
