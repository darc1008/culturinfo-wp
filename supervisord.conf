[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:mariadb]
command=/usr/bin/mysqld_safe --datadir=/var/lib/mysql
autostart=true
autorestart=true
priority=100
user=mysql
stdout_logfile=/var/log/mariadb.log
stderr_logfile=/var/log/mariadb.err

[program:apache2]
command=/usr/local/bin/apache2-foreground
autostart=false
autorestart=true
priority=200
stdout_logfile=/var/log/apache2.log
stderr_logfile=/var/log/apache2.err
